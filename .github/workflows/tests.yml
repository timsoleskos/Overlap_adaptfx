name: Tests

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Cache Numba JIT artefacts
        uses: actions/cache@v4
        with:
          path: adaptive_fractionation_overlap/__pycache__
          key: numba-${{ runner.os }}-${{ hashFiles('adaptive_fractionation_overlap/core_adaptfx.py') }}

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ --cov=adaptive_fractionation_overlap --cov-report=term-missing

  package-build:
    name: Package Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Validate package metadata
        run: |
          python -m twine check dist/*

      - name: Verify wheel installation and imports
        run: |
          python -m pip install dist/*.whl
          python -c "import adaptive_fractionation_overlap"
          python -c "from adaptive_fractionation_overlap.core_adaptfx import adaptfx_full"
